<style>
  :root{
    --ink:#0f1a14; --muted:#6b7b72; --faint:#9aa8a1;
    --paper:#eef2ee; --card:#ffffff; --line:#e2e8e3; --line-soft:#eef2ee;
    --green:#1b7a4b; --green-deep:#0f3d2a; --bright:#1fb85f;
    --amber:#e09a2d; --red:#d6453f; --blue:#3a6ea5; --gold:#c79324;
    --shadow:0 1px 2px rgba(16,40,28,.06),0 8px 24px rgba(16,40,28,.05);
    --radius:18px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
    --tabh:62px;
  }
  [data-theme="dark"]{
    --ink:#e8efea; --muted:#8fa39a; --faint:#5f7068;
    --paper:#0c1310; --card:#141d18; --line:#243029; --line-soft:#1a241e;
    --green:#2f9e63; --green-deep:#0a2419; --bright:#25c266;
    --amber:#e0a945; --red:#e0635d; --blue:#5d8fc4; --gold:#dcab3e;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 12px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper); color:var(--ink);
    font-variant-numeric:tabular-nums; -webkit-font-smoothing:antialiased;
    line-height:1.4; overscroll-behavior-y:none;
    padding-bottom:calc(var(--tabh) + var(--safe-bottom) + 8px);
  }
  .money{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:30;padding:calc(var(--safe-top) + 10px) 16px 12px;background:linear-gradient(180deg,var(--green-deep),#10402c);color:#eafff3}
  [data-theme="dark"] .topbar{background:linear-gradient(180deg,#08160f,#0c2419)}
  .monthrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .monthrow .mtitle{font-weight:700;font-size:17px;letter-spacing:.2px;display:flex;flex-direction:column;align-items:center;background:none}
  .monthrow .mtitle small{font-weight:500;font-size:11px;opacity:.6;letter-spacing:.4px;text-transform:uppercase}
  .navbtn,.gear{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.08);color:#eafff3;font-size:20px;transition:background .15s}
  .navbtn:active,.gear:active{background:rgba(255,255,255,.2)}
  .gear{font-size:17px}

  .hero{margin-top:14px;text-align:center}
  .hero .amt{font-size:46px;font-weight:800;letter-spacing:-1px;line-height:1;transition:color .25s}
  .hero .lbl{font-size:13px;font-weight:600;margin-top:6px;opacity:.92}
  .hero.ok .amt{color:#7dffb4} .hero.over .amt{color:#ffb3ad} .hero.under .amt{color:#ffe0a3}
  .meter{height:6px;border-radius:6px;background:rgba(255,255,255,.14);margin:14px 6px 4px;overflow:hidden}
  .meter > i{display:block;height:100%;border-radius:6px;background:#7dffb4;width:0;transition:width .4s ease}
  .meter.over > i{background:#ffb3ad}
  .sub{display:flex;justify-content:center;gap:18px;margin-top:10px;font-size:12px;opacity:.85}
  .sub b{font-weight:700;opacity:1}
  .pagehead{margin-top:14px;text-align:center}
  .pagehead .t{font-size:24px;font-weight:800;letter-spacing:-.3px}
  .pagehead .d{font-size:12.5px;opacity:.8;margin-top:3px}

  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 0}

  /* groups & items */
  .group{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;border:1px solid var(--line-soft)}
  .ghead{display:flex;align-items:center;gap:10px;padding:14px}
  .chev{transition:transform .2s;color:var(--faint);font-size:13px;width:14px;flex:none}
  .group.collapsed .chev{transform:rotate(-90deg)}
  .gname{font-weight:700;font-size:15px;flex:1}
  .gmeta{font-size:12px;color:var(--muted);text-align:right;line-height:1.25}
  .gmeta b{color:var(--ink)}
  .gedit{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--faint);font-size:14px;flex:none;background:var(--line-soft)}
  .gedit:active{background:var(--line);color:var(--green)}
  .gbar{height:4px;background:var(--line)}
  .gbar > i{display:block;height:100%;background:var(--green);width:0;transition:width .4s}
  .gbar.over > i{background:var(--red)}
  .group.collapsed .gbody{display:none}
  .item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--line-soft);cursor:pointer}
  .item:active{background:var(--line-soft)}
  .ileft{flex:1;min-width:0}
  .iname{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .tag{font-size:9.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);padding:1px 5px;border-radius:5px}
  .tag.due{color:var(--amber);background:color-mix(in srgb,var(--amber) 16%,transparent)}
  .tag.paid{color:var(--green);background:color-mix(in srgb,var(--green) 14%,transparent)}
  .ibar{height:5px;border-radius:5px;background:var(--line);margin-top:7px;overflow:hidden;max-width:190px}
  .ibar > i{display:block;height:100%;border-radius:5px;background:var(--green);width:0;transition:width .4s}
  .ibar.warn > i{background:var(--amber)} .ibar.over > i{background:var(--red)}
  .iright{text-align:right;flex:none}
  .iremain{font-weight:700;font-size:14.5px}
  .isub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .iremain.over{color:var(--red)} .iremain.fund{color:var(--blue)}
  .addrow{padding:11px 14px;border-top:1px solid var(--line-soft);color:var(--green);font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .addrow:active{background:var(--line-soft)}
  .addrow .plus{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--green);display:grid;place-items:center;font-size:13px;line-height:1}
  .income .ghead{cursor:default}
  .addgroup{width:100%;text-align:center;padding:14px;color:var(--green);font-weight:700;font-size:14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;gap:8px}
  .addgroup:active{background:var(--line-soft)}
  .summary{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:4px 16px;margin-bottom:24px;border:1px solid var(--line-soft)}
  .srow{display:flex;justify-content:space-between;padding:11px 0;font-size:14px;border-bottom:1px solid var(--line-soft)}
  .srow:last-child{border-bottom:none;font-weight:800}
  .srow span:last-child{font-weight:700}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty h3{color:var(--ink);margin:0 0 6px;font-size:18px}
  .empty p{margin:0 0 18px;font-size:14px}

  /* section card (used across premium tabs) */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line-soft);margin-bottom:14px;overflow:hidden}
  .card .chd{padding:14px 16px 4px;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:space-between}
  .card .chd .sub2{font-size:12px;color:var(--muted);font-weight:600}
  .card .cpad{padding:14px 16px}

  /* bills */
  .bill{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid var(--line-soft)}
  .bill:first-child{border-top:none}
  .billday{width:42px;height:42px;border-radius:12px;background:var(--line-soft);display:grid;place-items:center;flex:none;line-height:1}
  .billday b{font-size:16px;font-weight:800} .billday s{font-size:9px;text-decoration:none;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .billday.paid{background:color-mix(in srgb,var(--green) 14%,transparent)}
  .billnm{flex:1;font-weight:600;font-size:14px}
  .billamt{font-weight:700;font-size:14px;text-align:right}

  /* transactions */
  .tx{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line-soft);cursor:pointer}
  .tx:first-child{border-top:none} .tx:active{background:var(--line-soft)}
  .tdot{width:9px;height:9px;border-radius:50%;background:var(--green);flex:none}
  .tdot.un{background:var(--amber)}
  .tx .tinfo{flex:1;min-width:0}
  .tx .tnote{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .tmeta{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .tamt{font-weight:700;font-size:14.5px;flex:none}
  .pill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}

  /* charts */
  .chartwrap{padding:10px 14px 16px}
  .hbar{display:flex;align-items:center;gap:10px;margin:9px 0}
  .hbar .hl{font-size:12.5px;width:33%;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hbar .ht{flex:1;height:22px;border-radius:7px;background:var(--line-soft);overflow:hidden;position:relative}
  .hbar .ht > i{position:absolute;left:0;top:0;bottom:0;border-radius:7px;background:var(--green);transition:width .5s}
  .hbar .hv{font-size:12px;font-weight:700;width:64px;text-align:right}
  svg.line{display:block;width:100%;height:auto}

  /* goals */
  .goal{padding:14px 16px;border-top:1px solid var(--line-soft);cursor:pointer}
  .goal:first-child{border-top:none} .goal:active{background:var(--line-soft)}
  .goal .gt{display:flex;justify-content:space-between;align-items:baseline}
  .goal .gtn{font-weight:700;font-size:15px} .goal .gtp{font-size:12px;color:var(--muted)}
  .goal .gbar2{height:8px;border-radius:8px;background:var(--line-soft);margin-top:9px;overflow:hidden}
  .goal .gbar2 > i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--green),var(--bright));transition:width .5s}
  .goal .gnums{display:flex;justify-content:space-between;font-size:12.5px;margin-top:7px}
  .goal .gnums b{font-weight:700}

  /* networth */
  .nwhead{text-align:center;padding:18px 16px 6px}
  .nwhead .nl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .nwhead .nv{font-size:34px;font-weight:800;letter-spacing:-.5px;margin-top:4px}
  .nwhead .nv.neg{color:var(--red)}
  .nwcol{padding:6px 16px 14px}
  .nwrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .nwrow:active{opacity:.6}
  .nwrow .nn{font-size:14px;font-weight:600} .nwrow .na{font-weight:700;font-size:14px}
  .nwlabel{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:14px 0 2px}
  .na.asset{color:var(--green)} .na.liab{color:var(--red)}

  /* fab + tabs */
  .fab{position:fixed;right:18px;bottom:calc(var(--tabh) + var(--safe-bottom) + 16px);z-index:25;height:52px;padding:0 20px;border-radius:26px;background:var(--green);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(27,122,75,.4);transition:transform .12s}
  .fab:active{transform:scale(.95)}
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:28;height:calc(var(--tabh) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:color-mix(in srgb,var(--card) 92%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex}
  .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--faint);font-size:10.5px;font-weight:600;position:relative}
  .tabbar button .ti{font-size:19px;line-height:1}
  .tabbar button.on{color:var(--green)}
  .tabbar button .lock{position:absolute;top:6px;right:calc(50% - 20px);font-size:9px;opacity:.7}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(8,16,12,.45);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;max-width:560px;margin:0 auto;background:var(--card);border-radius:24px 24px 0 0;transform:translateY(110%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding:8px 18px calc(22px + var(--safe-bottom));max-height:92vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
  .sheet.show{transform:translateY(0)}
  .grip{width:38px;height:5px;border-radius:5px;background:var(--line);margin:8px auto 14px}
  .sheet h2{font-size:19px;margin:0 0 16px;font-weight:800}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--paper);color:var(--ink);font-size:16px;outline:none;transition:border-color .15s}
  .field textarea{min-height:120px;resize:vertical;font-size:14px;font-family:ui-monospace,Menlo,monospace}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
  .amtinput{position:relative}
  .amtinput .cur{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;font-weight:600}
  .amtinput input{padding-left:36px;font-weight:700}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:11px;border-radius:11px;border:1.5px solid var(--line);font-weight:700;font-size:13.5px;color:var(--muted);background:var(--paper)}
  .seg button.on{border-color:var(--green);color:var(--green);background:color-mix(in srgb,var(--green) 8%,var(--paper))}
  .btn{width:100%;padding:15px;border-radius:13px;background:var(--green);color:#fff;font-weight:700;font-size:16px;margin-top:6px}
  .btn:active{opacity:.85}
  .btn.ghost{background:transparent;color:var(--muted);box-shadow:none}
  .btn.danger{background:transparent;color:var(--red);font-weight:600;font-size:14px;padding:12px}
  .btn.gold{background:linear-gradient(135deg,#caa033,#9c7a1d)}
  .btnrow{display:flex;gap:10px}.btnrow .btn{margin-top:6px}
  .sumcard{display:flex;justify-content:space-between;background:var(--paper);border-radius:13px;padding:13px 16px;margin-bottom:16px}
  .sumcard div{text-align:center;flex:1}
  .sumcard .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .sumcard .v{font-size:18px;font-weight:800;margin-top:3px}
  .sumcard .v.over{color:var(--red)}
  .setrow{display:flex;align-items:center;justify-content:space-between;padding:15px 2px;border-bottom:1px solid var(--line-soft);gap:14px}
  .setrow .sk{font-weight:600;font-size:15px}
  .setrow .sd{font-size:12px;color:var(--muted);margin-top:2px}
  .switch{width:50px;height:30px;border-radius:30px;background:var(--line);position:relative;transition:background .2s;flex:none}
  .switch.on{background:var(--green)}
  .switch i{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .switch.on i{left:23px}
  .linkbtn{color:var(--green);font-weight:700;font-size:14px;padding:6px 0;flex:none}
  .toast{position:fixed;left:50%;bottom:calc(var(--tabh) + var(--safe-bottom) + 80px);transform:translateX(-50%) translateY(20px);background:var(--green-deep);color:#eafff3;padding:11px 18px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:60;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hint{font-size:12.5px;color:var(--muted);margin:-6px 0 14px;line-height:1.45}

  /* premium */
  .crown{font-size:11px;color:var(--gold)}
  .prohead{text-align:center;padding:14px 8px 4px}
  .prohead .pc{font-size:34px}
  .prohead h2{margin:8px 0 4px;font-size:22px}
  .prohead p{color:var(--muted);font-size:13.5px;margin:0 0 8px;line-height:1.5}
  .feat{display:flex;gap:12px;align-items:flex-start;padding:12px 4px;border-bottom:1px solid var(--line-soft)}
  .feat .fi{width:34px;height:34px;border-radius:10px;background:color-mix(in srgb,var(--gold) 16%,transparent);color:var(--gold);display:grid;place-items:center;font-size:16px;flex:none}
  .feat .fn{font-weight:700;font-size:14.5px} .feat .fd{font-size:12.5px;color:var(--muted);margin-top:1px}
  .lockcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line-soft);padding:8px 16px 18px;margin-top:8px}
  .gban{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,color-mix(in srgb,var(--gold) 18%,var(--card)),var(--card));border:1px solid color-mix(in srgb,var(--gold) 30%,transparent);border-radius:14px;padding:12px 14px;margin-bottom:14px}
  .gban .gbi{font-size:20px}.gban .gbt{flex:1;font-size:13px;font-weight:600}.gban .gbb{font-size:12px;font-weight:800;color:var(--gold)}
  .gban.warn{background:linear-gradient(135deg,color-mix(in srgb,var(--amber) 20%,var(--card)),var(--card));border-color:color-mix(in srgb,var(--amber) 36%,transparent)}
  .gban.warn .gbb{color:var(--amber);background:color-mix(in srgb,var(--amber) 16%,transparent);padding:6px 12px;border-radius:20px}
  .gban .bkx{color:var(--faint);font-size:13px;width:24px;height:24px;flex:none;border-radius:50%}
  .gban .bkx:active{background:var(--line)}
  .rtag{font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--green);background:color-mix(in srgb,var(--green) 13%,transparent);padding:1px 5px;border-radius:5px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

const $=(s,el=document)=>el.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,9);
const monthKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
const nowMonth=()=>monthKey(new Date());
const todayISO=()=>new Date().toISOString().slice(0,10);
const CURRENCIES={SGD:"S$",USD:"$",MYR:"RM",EUR:"€",GBP:"£",AUD:"A$",INR:"₹",PHP:"₱",THB:"฿",IDR:"Rp",JPY:"¥"};
let view="budget";
let backupDismissed=false;
let installTipDismissed=false;
function isStandalone(){return (window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||navigator.standalone===true;}

/* ---------- state ---------- */
let state=load();
let active=state.active||monthKey(new Date());
ensureMonth(active);

function blankMonth(){return{income:[],groups:[],inbox:[]};}
function latestMonthBefore(k){const keys=Object.keys(state.months).filter(x=>x<k).sort();return keys.length?keys[keys.length-1]:null;}
function cloneItemForNewMonth(it){return{id:uid(),name:it.name,type:it.type,planned:it.planned,due:it.due||null,
  start:it.type==="fund"?((+it.start||0)+(+it.planned||0)-itemSpent(it)):0,
  recur:it.recur||null,recurNote:it.recurNote||"",recurDone:false,txns:[]};}
function materializeMonth(key,src){
  return{income:src.income.map(i=>({id:uid(),name:i.name,amount:i.amount,received:false})),inbox:[],
    groups:src.groups.map(g=>({id:uid(),name:g.name,collapsed:false,items:g.items.map(cloneItemForNewMonth)}))};
}
// auto-log recurring charges once a month has actually arrived; idempotent and respects manual deletion
function applyRecurring(key){
  if(key>nowMonth())return;
  const m=state.months[key];if(!m)return;
  m.groups.forEach(g=>g.items.forEach(it=>{
    if(it.type==="expense"&&+it.recur>0&&!it.recurDone){
      const day=String(Math.min(28,Math.max(1,it.due||1))).padStart(2,"0");
      it.txns.push({id:uid(),amount:+it.recur,note:it.recurNote||"Recurring",date:key+"-"+day,auto:true});
      it.recurDone=true;
    }
  }));
}
function ensureMonth(k){
  if(!state.months[k]){
    const prev=latestMonthBefore(k);
    state.months[k]=(state.settings.autostart!==false&&prev)?materializeMonth(k,state.months[prev]):blankMonth();
  }
  const m=state.months[k]; if(!m.inbox)m.inbox=[]; if(!m.income)m.income=[]; if(!m.groups)m.groups=[];
}
function templateMonth(){
  const g=(name,items)=>({id:uid(),name,collapsed:false,items:items.map(n=>({id:uid(),name:n,type:"expense",planned:0,start:0,due:null,txns:[]}))});
  return{income:[{id:uid(),name:"Take-home pay",amount:0,received:false}],inbox:[],groups:[
    g("Giving",["Tithe","Charity"]),g("Savings",["Emergency fund","Investments"]),
    g("Housing",["Rent / mortgage","Utilities","Internet & phone"]),
    g("Transportation",["Transport / fuel","Grab / taxi"]),
    g("Food",["Groceries","Dining out","Coffee"]),
    g("Lifestyle",["Subscriptions","Shopping","Fun money"]),
    g("Health",["Insurance","Medical","Gym"])]};
}
function defaults(){return{active:monthKey(new Date()),settings:{currency:"SGD",theme:"light",firstRun:true,premium:false,autostart:true,lastBackup:null},months:{},goals:[],networth:{}};}
function migrate(r){
  r.settings=r.settings||{};const s=r.settings;
  if(s.currency===undefined)s.currency="SGD"; if(s.theme===undefined)s.theme="light";
  if(s.premium===undefined)s.premium=false; if(s.autostart===undefined)s.autostart=true;
  if(s.lastBackup===undefined)s.lastBackup=null; if(s.firstRun===undefined)s.firstRun=false;
  r.goals=r.goals||[]; r.networth=r.networth||{}; r.months=r.months||{};
  Object.values(r.months).forEach(m=>{
    m.inbox=m.inbox||[]; m.income=m.income||[]; m.groups=m.groups||[];
    m.groups.forEach(g=>{g.items=g.items||[];g.items.forEach(it=>{
      if(it.txns===undefined)it.txns=[]; if(it.type===undefined)it.type="expense";
      if(it.recur===undefined)it.recur=null; if(it.recurNote===undefined)it.recurNote="";
      if(it.recurDone===undefined)it.recurDone=false; if(it.due===undefined)it.due=null;
      if(it.start===undefined)it.start=0;
    });});
  });
  r.schema=SCHEMA; return r;
}
function readKey(k){try{const r=JSON.parse(localStorage.getItem(k));if(r&&r.months)return r;}catch(e){}return null;}
function load(){
  let r=readKey(STORE_KEY);
  if(!r){for(const k of LEGACY_KEYS){r=readKey(k);if(r)break;}}
  if(r)return migrate(r);
  const d=defaults(); d.months[d.active]=templateMonth(); d.schema=SCHEMA; return d;
}
let storageWarned=false;
function save(){state.active=active;try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){if(!storageWarned){storageWarned=true;toast("⚠ Couldn't save — back up your data");}}}
const isPro=()=>!!state.settings.premium;

/* ---------- money ---------- */
function sym(){return CURRENCIES[state.settings.currency]||"$";}
function fmt(n,opts={}){const neg=n<0;n=Math.abs(n);const dec=(opts.noDec||ZERO_DEC.has(state.settings.currency))?0:2;const s=n.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec});return(neg?"−":"")+sym()+s;}
const sum=(a,f)=>a.reduce((t,x)=>t+f(x),0);
function parseAmt(v){if(v==null)return 0;let s=String(v).trim();let neg=/^\(.*\)$/.test(s)||/-/.test(s);s=s.replace(/[(),]/g,"").replace(/[^0-9.\-]/g,"");let n=parseFloat(s);if(isNaN(n))return 0;return neg?-Math.abs(n):n;}

/* ---------- computations ---------- */
const M=()=>state.months[active];
const incomeTotal=()=>sum(M().income,i=>+i.amount||0);
const itemSpent=it=>sum(it.txns,t=>+t.amount||0);
const itemRemaining=it=>it.type==="fund"?(+it.start||0)+(+it.planned||0)-itemSpent(it):(+it.planned||0)-itemSpent(it);
const groupPlanned=g=>sum(g.items,i=>+i.planned||0);
const groupSpent=g=>sum(g.items,itemSpent);
const plannedTotal=()=>sum(M().groups,groupPlanned);
const spentTotal=()=>sum(M().groups,groupSpent);
const leftToBudget=()=>incomeTotal()-plannedTotal();
function spentInMonth(k){const m=state.months[k];if(!m)return 0;return sum(m.groups||[],g=>sum(g.items,itemSpent));}
function plannedInMonth(k){const m=state.months[k];if(!m)return 0;return sum(m.groups||[],groupPlanned);}
function monthsWithData(){return Object.keys(state.months).filter(k=>{const m=state.months[k];return (m.groups&&m.groups.length)||(m.income&&m.income.length)||(m.inbox&&m.inbox.length);}).sort();}
function allItems(){const out=[];M().groups.forEach(g=>g.items.forEach(it=>out.push({g,it})));return out;}

/* ---------- dom helpers ---------- */
function el(html){const t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstChild;}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function openSheet(html){$("#sheetBody").innerHTML=html;$("#scrim").classList.add("show");$("#sheet").classList.add("show");$("#sheet").scrollTop=0;}
function closeSheet(){$("#scrim").classList.remove("show");$("#sheet").classList.remove("show");}
$("#scrim").onclick=closeSheet;
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),1900);}

/* ---------- charts (dependency-free svg) ---------- */
function hbars(rows){ // rows:[{label,value,max,color}]
  const max=Math.max(1,...rows.map(r=>r.max!=null?r.max:r.value));
  return `<div class="chartwrap">${rows.map(r=>{
    const w=Math.min(100,(r.value/max)*100);
    return `<div class="hbar"><div class="hl">${esc(r.label)}</div><div class="ht"><i style="width:${w}%;background:${r.color||'var(--green)'}"></i></div><div class="hv money">${fmt(r.value,{noDec:true})}</div></div>`;
  }).join("")}</div>`;
}
function lineChart(pts,opt={}){ // pts:[{label,value}]
  if(pts.length<2) return `<div class="hint" style="padding:18px 16px;text-align:center">Need at least two months of data to chart a trend.</div>`;
  const W=320,H=140,pad=24,bot=22;
  const vals=pts.map(p=>p.value);
  let mn=Math.min(...vals,0),mx=Math.max(...vals,1);if(mn===mx)mx=mn+1;
  const x=i=>pad+i*((W-pad*2)/(pts.length-1));
  const y=v=>(H-bot)-((v-mn)/(mx-mn))*((H-bot)-pad+10)+ (pad-10);
  const yy=v=>(H-bot)-((v-mn)/(mx-mn))*((H-bot)-(pad-6));
  const line=pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${yy(p.value).toFixed(1)}`).join(" ");
  const area=`${line} L${x(pts.length-1).toFixed(1)},${H-bot} L${x(0).toFixed(1)},${H-bot} Z`;
  const zeroY=yy(0);
  return `<div class="chartwrap"><svg class="line" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${opt.color||'var(--green)'}" stop-opacity=".28"/><stop offset="1" stop-color="${opt.color||'var(--green)'}" stop-opacity="0"/></linearGradient></defs>
    ${mn<0?`<line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="var(--line)" stroke-dasharray="3 3"/>`:''}
    <path d="${area}" fill="url(#lg)"/>
    <path d="${line}" fill="none" stroke="${opt.color||'var(--green)'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${yy(p.value).toFixed(1)}" r="3" fill="${opt.color||'var(--green)'}"/>`).join("")}
    ${pts.map((p,i)=>`<text x="${x(i).toFixed(1)}" y="${H-7}" font-size="9" fill="var(--muted)" text-anchor="middle">${esc(p.label)}</text>`).join("")}
  </svg></div>`;
}

function renderInsights(app){
  const cards=[];
  const left=leftToBudget();
  if(left>0.005)cards.push(["💡","Assign your money",`You have ${fmt(left)} left to budget. Give it a job so every dollar has a purpose.`]);
  else if(left<-0.005)cards.push(["⚠️","Over-budgeted",`You've planned ${fmt(-left)} more than your income. Trim a category to balance.`]);
  // overspent items this month
  const over=allItems().filter(({it})=>itemRemaining(it)<-0.005).sort((a,b)=>itemRemaining(a.it)-itemRemaining(b.it));
  if(over.length)cards.push(["🔴","Watch your overspending",`${over[0].it.name} is over by ${fmt(-itemRemaining(over[0].it))}${over.length>1?` (+${over.length-1} more)`:''}.`]);
  // historical underspend suggestion
  const sug=marginFinder();
  if(sug)cards.push(["✨","Found margin",sug]);
  if(!cards.length)cards.push(["✅","Looking good","Your budget is balanced and nothing is overspent. Keep it up."]);
  const c=el(`<div class="card"></div>`);
  c.appendChild(el(`<div class="chd"><span>Insights <span class="crown">♛ premium</span></span></div>`));
  const pad=el(`<div></div>`);

  pad.lastChild.style.borderBottom="none";

function marginFinder(){
  // find an item where, across previous months, avg spend is well under current planned
  const months=monthsWithData().filter(k=>k<active);
  if(months.length<1)return null;
  let best=null;
  allItems().forEach(({it})=>{
    if(it.type==="fund"||!(+it.planned>0))return;
    let tot=0,cnt=0;
    months.forEach(k=>{const mm=state.months[k];(mm.groups||[]).forEach(g=>g.items.forEach(x=>{if(x.name===it.name){tot+=itemSpent(x);cnt++;}}));});
    if(cnt<1)return;const avg=tot/cnt;const slack=(+it.planned)-avg;
    if(slack> (+it.planned)*0.25 && slack>5){if(!best||slack>best.slack)best={name:it.name,slack,avg};}
  });
  if(!best)return null;
  return `You usually spend about ${fmt(best.avg)} on ${best.name} but planned more — reallocating ~${fmt(best.slack)} could speed up a goal.`;
}

function splitCSVLine(line){
  const semis=(line.match(/;/g)||[]).length, commas=(line.match(/,/g)||[]).length;
  const delim = line.indexOf("\t")>-1 ? "\t" : (semis>commas ? ";" : ",");
  const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){const c=line[i];
    if(c==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(c===delim&&!q){ out.push(cur);cur=""; }
    else cur+=c;
  }
  out.push(cur);
  return out.map(s=>s.trim()).filter(s=>s!=="");
}
function parseCSV(text){
  const out=[];text.split(/\r?\n/).forEach(line=>{
    line=line.trim();if(!line)return;
    const parts=splitCSVLine(line);
    if(!parts.length)return;
    let date="",amount=0,noteParts=[];
    parts.forEach(p=>{
      const dm=p.match(/(\d{4}[-/]\d{1,2}[-/]\d{1,2})|(\d{1,2}[-/]\d{1,2}[-/]\d{2,4})/);
      if(dm&&!date){date=normDate(dm[0]);return;}
      const looksAmt=/^[-(]?\s*[$€£¥₹฿]?\s*\d[\d.,]*\)?$/.test(p.replace(/\s/g,""));
      if(looksAmt){const a=parseAmt(p);if(a!==0)amount=Math.abs(a);return;}
      noteParts.push(p);
    });
    if(amount===0){ // fallback: last numeric token
      for(let i=parts.length-1;i>=0;i--){const a=parseAmt(parts[i]);if(a){amount=Math.abs(a);noteParts=parts.filter((_,j)=>j!==i&&!/\d{4}[-/]/.test(parts[j]));break;}}
    }
    if(amount===0)return;
    out.push({amount,note:noteParts.join(" ").slice(0,60)||"Transaction",date:date||todayISO()});
  });
  return out;
}
function normDate(s){s=s.replace(/\//g,"-");const p=s.split("-");if(p[0].length===4)return `${p[0]}-${p[1].padStart(2,"0")}-${p[2].padStart(2,"0")}`;let yr=p[2].length===2?"20"+p[2]:p[2];return `${yr}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;}

    <div class="field"><label>Assign this amount</label><div class="amtinput"><span class="cur">${sym()}</span><input id="as_amt" type="number" inputmode="decimal" value="${(+tx.amount||0).toFixed(2)}"></div><div class="hint" style="margin-top:6px">Assign less than the full amount to split it — the remainder stays in your inbox.</div></div>

    <button class="btn danger" id="as_del">Delete transaction</button>`);
  const box=$("#as_items");

function arrMove(arr,i,d){const j=i+d;if(j<0||j>=arr.length)return false;const t=arr[i];arr[i]=arr[j];arr[j]=t;return true;}

function openItem(g,it){
  const isFund=it.type==="fund";drawItem();
  function drawItem(){
    const txs=[...it.txns].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    openSheet(`<h2>${esc(it.name)} ${isFund?'<span class="tag">fund</span>':''}</h2>
      <div class="sumcard"><div><div class="k">${isFund?'Contribution':'Planned'}</div><div class="v money">${fmt(+it.planned||0)}</div></div><div><div class="k">${isFund?'Withdrawn':'Spent'}</div><div class="v money">${fmt(itemSpent(it))}</div></div><div><div class="k">${isFund?'Available':'Remaining'}</div><div class="v money ${itemRemaining(it)<-0.005?'over':''}">${fmt(itemRemaining(it))}</div></div></div>
      <div class="field"><label>${isFund?'Record a withdrawal':'Log a transaction'}</label><div class="amtinput"><span class="cur">${sym()}</span><input id="tx_amt" type="number" inputmode="decimal" placeholder="0.00"></div></div>
      <div class="field"><input id="tx_note" placeholder="Note (optional)"></div>
      <div class="btnrow"><input id="tx_date" type="date" value="${todayISO()}" style="flex:1;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--paper);color:var(--ink)"><button class="btn" style="flex:1;margin-top:0" id="tx_add">Add</button></div>
      <div style="margin:4px 0 8px">${txs.length?txs.map(t=>`<div class="tx" style="cursor:default"><span class="tdot"></span><div class="tinfo"><div class="tnote">${esc(t.note||(isFund?'Withdrawal':'Spent'))}</div><div class="tmeta">${t.date||''}</div></div><div class="tamt money">${fmt(+t.amount||0)}</div><button class="linkbtn" style="color:var(--faint);font-size:18px;margin-left:10px" data-del="${t.id}">×</button></div>`).join(""):'<div class="cpad" style="text-align:center;color:var(--muted);font-size:13.5px">No transactions yet</div>'}</div>
      <button class="btn ghost" id="it_edit">Edit item settings</button>`);
    $("#tx_add").onclick=()=>{const a=parseAmt($("#tx_amt").value);if(!a){$("#tx_amt").focus();return;}it.txns.push({id:uid(),amount:Math.abs(a),note:$("#tx_note").value.trim(),date:$("#tx_date").value||todayISO()});render();drawItem();};
    $("#sheetBody").querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{it.txns=it.txns.filter(x=>x.id!==b.dataset.del);render();drawItem();});
    $("#it_edit").onclick=()=>editItem(g,it);
    setTimeout(()=>$("#tx_amt").focus(),300);
  }
}

/* ===================== month nav ===================== */
function shiftMonth(d){const[y,m]=active.split("-").map(Number);active=monthKey(new Date(y,m-1+d,1));ensureMonth(active);save();render();}
$("#prevM").onclick=()=>shiftMonth(-1);
$("#nextM").onclick=()=>shiftMonth(1);
$("#monthBtn").onclick=()=>monthSheet();
function monthSheet(){
  const cur=active;const[y,m]=active.split("-").map(Number);const prevKey=monthKey(new Date(y,m-2,1));const hasPrev=!!state.months[prevKey];
  openSheet(`<h2>Jump to month</h2>
    <div class="field"><input id="m_pick" type="month" value="${cur}"></div>
    <button class="btn" id="m_go">Go</button>
    ${hasPrev?`<button class="btn ghost" id="m_copy">⧉ Copy ${new Date(y,m-2,1).toLocaleDateString(undefined,{month:'long'})} into this month</button>`:""}
    <div class="hint">Copying brings over your groups and planned amounts (and carries fund balances forward), but not last month's transactions.</div>`);
  $("#m_go").onclick=()=>{active=$("#m_pick").value||cur;ensureMonth(active);save();closeSheet();render();};
  if(hasPrev)$("#m_copy").onclick=()=>{
    if((M().groups.length||M().income.length)&&!confirm("Replace this month's budget with a copy of last month? Transactions logged this month will be cleared."))return;
    state.months[active]=materializeMonth(active,state.months[prevKey]);
    save();closeSheet();toast("Budget copied");render();};
}

/* ===================== settings ===================== */
$("#settingsBtn").onclick=()=>settingsSheet();
function settingsSheet(){
  const s=state.settings;
  openSheet(`<h2>Settings</h2>
    <div class="field"><label>Currency</label><select id="s_cur">${Object.keys(CURRENCIES).map(c=>`<option value="${c}" ${s.currency===c?'selected':''}>${c} — ${CURRENCIES[c]}</option>`).join("")}</select></div>
    <div class="setrow"><div><div class="sk">Premium <span class="crown">♛</span></div><div class="sd">Transactions, reports, roadmap, insights</div></div><div class="switch ${s.premium?'on':''}" id="s_pro"><i></i></div></div>
    <div class="setrow"><div><div class="sk">Dark mode</div><div class="sd">Easier on the eyes at night</div></div><div class="switch ${s.theme==='dark'?'on':''}" id="s_theme"><i></i></div></div>
    <div class="setrow"><div><div class="sk">Auto-start new months</div><div class="sd">Carry your budget &amp; recurring charges forward</div></div><div class="switch ${s.autostart!==false?'on':''}" id="s_auto"><i></i></div></div>
    <div class="setrow"><div><div class="sk">Recurring charges</div><div class="sd">${recurringItems().length?recurringItems().length+' active':'None yet'}</div></div><button class="linkbtn" id="s_recur">Manage</button></div>
    <div class="setrow"><div><div class="sk">Export budget (CSV)</div><div class="sd">This month's groups &amp; items</div></div><button class="linkbtn ${s.premium?'':'pro'}" id="s_csvb">Export</button></div>
    <div class="setrow"><div><div class="sk">Export transactions (CSV)</div><div class="sd">All logged transactions</div></div><button class="linkbtn" id="s_csvt">Export</button></div>
    <div class="setrow"><div><div class="sk">Backup data (JSON)</div><div class="sd">${s.lastBackup?('Last backup '+new Date(s.lastBackup).toLocaleDateString()):'Never backed up — recommended'}</div></div><button class="linkbtn" id="s_export">Back up</button></div>
    <div class="setrow"><div><div class="sk">Import data</div><div class="sd">Restore from a backup file</div></div><button class="linkbtn" id="s_import">Import</button></div>
    <div class="setrow" style="border:none"><div><div class="sk" style="color:var(--red)">Reset this month</div><div class="sd">Clear groups &amp; transactions</div></div><button class="linkbtn" id="s_reset" style="color:var(--red)">Reset</button></div>
    <input id="s_file" type="file" accept="application/json" style="display:none">
    <div class="hint" style="margin-top:14px">Zero stores everything on this device only. Add to Home Screen in Safari for an offline, app-like experience.</div>`);
  $("#s_cur").onchange=()=>{s.currency=$("#s_cur").value;save();render();settingsSheet();};
  $("#s_pro").onclick=function(){s.premium=!s.premium;this.classList.toggle("on");save();render();toast(s.premium?"Premium on":"Premium off");};
  $("#s_theme").onclick=function(){s.theme=s.theme==="dark"?"light":"dark";this.classList.toggle("on");save();render();};
  $("#s_auto").onclick=function(){s.autostart=!(s.autostart!==false);this.classList.toggle("on",s.autostart);save();};
  $("#s_recur").onclick=()=>manageRecurring();
  $("#s_csvb").onclick=()=>{if(!s.premium)return toast("Premium feature — turn it on above");exportBudgetCSV();};
  $("#s_csvt").onclick=()=>{if(!s.premium)return toast("Premium feature — turn it on above");exportTxnCSV();};
  $("#s_export").onclick=()=>{backupJSON();toast("Backup downloaded");settingsSheet();};
  $("#s_import").onclick=()=>$("#s_file").click();
  $("#s_file").onchange=e=>{const f=e.target.files[0];if(!f)return;if(!confirm("Importing replaces ALL current data on this device. A backup of your current data is recommended first. Continue?")){e.target.value="";return;}const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d&&d.months){state=migrate(d);active=state.active||Object.keys(state.months)[0];ensureMonth(active);save();closeSheet();toast("Data imported");render();}else toast("Not a valid backup");}catch(err){toast("Couldn't read file");}};r.readAsText(f);};
  $("#s_reset").onclick=()=>{if(confirm("Reset this month? Groups and transactions for "+active+" will be cleared.")){state.months[active]=blankMonth();save();closeSheet();render();}};
}
function download(text,name,type){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href);}
function csvCell(v){v=String(v==null?"":v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportBudgetCSV(){
  let rows=[["Group","Item","Type","Planned","Spent","Remaining","Due day"]];
  M().groups.forEach(g=>g.items.forEach(it=>rows.push([g.name,it.name,it.type,(+it.planned||0).toFixed(2),itemSpent(it).toFixed(2),itemRemaining(it).toFixed(2),it.due||""])));
  download(rows.map(r=>r.map(csvCell).join(",")).join("\n"),`zero-budget-${active}.csv`,"text/csv");toast("Budget CSV downloaded");
}
function exportTxnCSV(){
  let rows=[["Date","Note","Group","Item","Amount"]];
  M().groups.forEach(g=>g.items.forEach(it=>it.txns.forEach(t=>rows.push([t.date||"",t.note||"",g.name,it.name,(+t.amount||0).toFixed(2)]))));
  M().inbox.forEach(t=>rows.push([t.date||"",t.note||"","","(unassigned)",(+t.amount||0).toFixed(2)]));
  download(rows.map(r=>r.map(csvCell).join(",")).join("\n"),`zero-transactions-${active}.csv`,"text/csv");toast("Transactions CSV downloaded");
}

/* ===================== fab + welcome + boot ===================== */
$("#fab").onclick=()=>editGroup(null);
function welcome(){
  if(!state.settings.firstRun)return;state.settings.firstRun=false;save();
  openSheet(`<h2>Welcome to Zero 👋</h2>
    <p style="font-size:14.5px;color:var(--muted);line-height:1.5;margin:0 0 16px">Zero is a <b style="color:var(--ink)">zero-based budget</b>: every dollar of income gets a job until <b style="color:var(--ink)">"left to budget"</b> reaches zero. Then log spending and watch each bar fill.</p>
    <ol style="font-size:14px;color:var(--muted);line-height:1.7;padding-left:18px;margin:0 0 14px"><li>Add your <b style="color:var(--ink)">income</b> up top.</li><li>Build <b style="color:var(--ink)">groups</b> &amp; items, assign each a planned amount.</li><li>Tap any item to <b style="color:var(--ink)">log spending</b>.</li></ol>
    <div class="gban"><span class="gbi">♛</span><span class="gbt">The Transactions, Reports &amp; Roadmap tabs are Premium — unlock them free in your copy.</span></div>
    <button class="btn" id="w_go">Start budgeting</button>`);
  $("#w_go").onclick=closeSheet;
}
function bootError(err){
  try{document.querySelector(".topbar").style.display="none";document.querySelector(".tabbar").style.display="none";document.querySelector(".fab").style.display="none";}catch(e){}
  const app=$("#app");if(!app)return;
  app.innerHTML=`<div class="empty"><h3>Something went wrong loading your budget</h3><p>Your saved data is still on this device. Download a backup, then reset if needed.</p></div>`;
  const b1=document.createElement("button");b1.className="addgroup";b1.textContent="⤓ Download my data (backup)";
  b1.onclick=()=>{try{download(localStorage.getItem(STORE_KEY)||localStorage.getItem("zero.budget.v2")||"{}",`zero-rescue-${todayISO()}.json`,"application/json");}catch(e){}};
  const b2=document.createElement("button");b2.className="addgroup";b2.style.borderColor="var(--red)";b2.style.color="var(--red)";b2.textContent="Reset app (after backing up)";
  b2.onclick=()=>{if(confirm("Reset Zero to a fresh state? Back up first — this clears saved data.")){try{localStorage.removeItem(STORE_KEY);}catch(e){}location.reload();}};
  app.appendChild(b1);app.appendChild(b2);
  console.error("Zero boot error:",err);
}
try{ render(); welcome(); }catch(err){ bootError(err); }

// resist iOS storage eviction
try{ if(navigator.storage&&navigator.storage.persist) navigator.storage.persist().catch(()=>{}); }catch(e){}

// web app manifest for installable PWA (icons embedded so it works as a single file)
try{
  const manifest={name:"Zero — budget",short_name:"Zero",start_url:".",scope:".",display:"standalone",background_color:"#0f3d2a",theme_color:"#0f3d2a",
    icons:[{src:ICON192,sizes:"192x192",type:"image/png"},{src:ICON512,sizes:"512x512",type:"image/png"},{src:ICONMASK,sizes:"512x512",type:"image/png",purpose:"maskable"}]};
  const link=document.createElement("link");link.rel="manifest";
  link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"}));
  document.head.appendChild(link);
}catch(e){}

if("serviceWorker" in navigator){
  const sw=`self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request).then(r=>{const c=r.clone();caches.open("zero-v3").then(ca=>ca.put(e.request,c));return r;}).catch(()=>caches.match(e.request)));});`;
  try{navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"text/javascript"}))).catch(()=>{});}catch(e){}
}

</script>
