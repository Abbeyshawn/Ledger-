<!-- Generate a real PNG app icon + manifest at runtime (no separate files needed) -->
<script>
(function(){
  try{
    var c=document.createElement('canvas'); c.width=180; c.height=180;
    var x=c.getContext('2d');
    var g=x.createLinearGradient(0,0,180,180); g.addColorStop(0,'#4F6BFF'); g.addColorStop(1,'#10B981');
    x.fillStyle=g;
    var r=40; x.beginPath();
    x.moveTo(r,0); x.arcTo(180,0,180,180,r); x.arcTo(180,180,0,180,r); x.arcTo(0,180,0,0,r); x.arcTo(0,0,180,0,r); x.closePath(); x.fill();
    // wallet glyph
    x.fillStyle='rgba(255,255,255,0.95)';
    x.beginPath();
    var wx=44, wy=58, ww=92, wh=66, rr=16;
    x.moveTo(wx+rr,wy); x.arcTo(wx+ww,wy,wx+ww,wy+wh,rr); x.arcTo(wx+ww,wy+wh,wx,wy+wh,rr); x.arcTo(wx,wy+wh,wx,wy,rr); x.arcTo(wx,wy,wx+ww,wy,rr); x.closePath(); x.fill();
    x.fillStyle=g; x.beginPath(); x.arc(wx+ww-22, wy+wh/2, 9, 0, Math.PI*2); x.fill();
    var url=c.toDataURL('image/png');
    var link=document.createElement('link'); link.rel='apple-touch-icon'; link.href=url; document.head.appendChild(link);
    var man={name:'Ledger',short_name:'Ledger',display:'standalone',orientation:'portrait',
      background_color:'#080A0F',theme_color:'#080A0F',start_url:'.',scope:'.',
      icons:[{src:url,sizes:'180x180',type:'image/png',purpose:'any maskable'}]};
    var mu=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:'application/json'}));
    var m=document.createElement('link'); m.rel='manifest'; m.href=mu; document.head.appendChild(m);
  }catch(e){}
})();
</script>

/* =================== Helpers =================== */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const fmt = (n) => "S$" + (Number(n)||0).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtShort = (n) => { const v=Number(n)||0; return v>=1000 ? "S$"+(v/1000).toFixed(1)+"k" : "S$"+Math.round(v); };
const monthKey = (d) => (d||"").slice(0,7);
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const todayISO = () => new Date().toISOString().slice(0,10);
function lastNMonths(n){ const out=[]; const now=new Date(); for(let i=n-1;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); out.push({key:d.toISOString().slice(0,7),label:MONTHS[d.getMonth()]});} return out; }

async function downscaleImage(file,max=1000,quality=0.7){
  return new Promise((resolve)=>{ const reader=new FileReader();
    reader.onload=(e)=>{ const img=new Image();
      img.onload=()=>{ let{width,height}=img; if(width>max||height>max){const r=Math.min(max/width,max/height);width=Math.round(width*r);height=Math.round(height*r);}
        const cv=document.createElement("canvas"); cv.width=width; cv.height=height; cv.getContext("2d").drawImage(img,0,0,width,height);
        resolve(cv.toDataURL("image/jpeg",quality)); };
      img.onerror=()=>resolve(e.target.result); img.src=e.target.result; };
    reader.readAsDataURL(file); });
}

/* AI settings live at module scope so callClaude can read them without prop-drilling */
let AI = { apiKey: "", proxyUrl: "" };
const aiEnabled = () => !!(AI.apiKey || AI.proxyUrl);

async function callClaude(messages, system, maxTokens=1000){
  if(!aiEnabled()){ const err=new Error("AI not configured"); err.noai=true; throw err; }
  const url = AI.proxyUrl || "https://api.anthropic.com/v1/messages";
  const headers = { "Content-Type":"application/json" };
  if(!AI.proxyUrl){
    headers["x-api-key"] = AI.apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const res = await fetch(url,{ method:"POST", headers, body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:maxTokens, system, messages }) });
  const data = await res.json();
  return (data.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n");
}
function parseJSON(text){ const clean=text.replace(/```json/gi,"").replace(/```/g,"").trim();
  try{ return JSON.parse(clean); }catch{ const m=clean.match(/\{[\s\S]*\}/); if(m){try{return JSON.parse(m[0]);}catch{return null;}} return null; } }

/* =================== Storage (localStorage + IndexedDB) =================== */
const LS = {
  read(k,def){ try{ const v=localStorage.getItem(k); return v==null?def:JSON.parse(v); }catch{ return def; } },
  write(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} },
};
const idb = {
  _db:null,
  open(){ return this._db || (this._db=new Promise((res,rej)=>{ const r=indexedDB.open("ledger",1);
    r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("receipts")) r.result.createObjectStore("receipts"); };
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); })); },
  async os(mode){ const db=await this.open(); return db.transaction("receipts",mode).objectStore("receipts"); },
  async get(id){ try{ const s=await this.os("readonly"); return await new Promise((res)=>{ const r=s.get(id); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); }catch{ return null; } },
  async set(id,data){ try{ const s=await this.os("readwrite"); return await new Promise((res)=>{ const r=s.put(data,id); r.onsuccess=()=>res(true); r.onerror=()=>res(false); }); }catch{ return false; } },
  async del(id){ try{ const s=await this.os("readwrite"); return await new Promise((res)=>{ const r=s.delete(id); r.onsuccess=()=>res(); r.onerror=()=>res(); }); }catch{} },
};
const store = {
  load(){
    return {
      expenses: LS.read("ledger:expenses",[]),
      rates: { ...DEFAULT_RATES, ...LS.read("ledger:rates",{}) },
      mode: LS.read("ledger:workspace","business"),
      settings: { apiKey:"", proxyUrl:"", ...LS.read("ledger:settings",{}) },
    };
  },
  saveExpenses(l){ LS.write("ledger:expenses",l); },
  saveRates(r){ LS.write("ledger:rates",r); },
  saveMode(m){ LS.write("ledger:workspace",m); },
  saveSettings(s){ LS.write("ledger:settings",s); },
  getReceipt(id){ return idb.get(id); },
  setReceipt(id,d){ return idb.set(id,d); },
  delReceipt(id){ return idb.del(id); },
};

    navIdle:"text-slate-400 hover:text-slate-100 hover:bg-white/[0.05]", divide:"border-white/[0.06]",
    grid:"#1b2029", axis:"#5b6472", tipBg:"#12151D", tipBorder:"#2a2f3a", tipText:"#e2e8f0",
  } : {
    dark:false, app:"bg-[#F6F7F9] text-slate-900",
    panel:"bg-white border border-slate-200/80 shadow-[0_1px_2px_rgba(15,23,42,0.04)]", panel2:"bg-slate-50 border border-slate-200/70",
    sub:"text-slate-500", faint:"text-slate-400",
    input:"bg-white border border-slate-300 text-slate-900 placeholder-slate-400",
    hover:"hover:bg-slate-50", chip:"bg-slate-100 border border-slate-200",
    navIdle:"text-slate-500 hover:text-slate-900 hover:bg-slate-100", divide:"border-slate-200",
    grid:"#eef1f5", axis:"#94a3b8", tipBg:"#ffffff", tipBorder:"#e2e8f0", tipText:"#0f172a",

}

/* =================== APP =================== */
function App(){
  const [dark,setDark]=useState(true);
  const [mode,setMode]=useState("business");
  const [view,setView]=useState("dashboard");
  const [expenses,setExpenses]=useState([]);
  const [rates,setRates]=useState({...DEFAULT_RATES});
  const [settings,setSettings]=useState({apiKey:"",proxyUrl:""});
  const [loaded,setLoaded]=useState(false);
  const [toast,setToast]=useState(null);
  const t=tokens(dark);
  const theme=THEMES[mode];

  useEffect(()=>{
    const s=store.load();
    const migrated=s.expenses.map(e=>e.mode?e:{...e,mode:e.reimbursable?"business":"personal"});
    setExpenses(migrated); setRates(s.rates); setMode(s.mode); setSettings(s.settings);
    AI={apiKey:s.settings.apiKey||"",proxyUrl:s.settings.proxyUrl||""};
    setLoaded(true);
  },[]);

  const notify=(m)=>{ setToast(m); setTimeout(()=>setToast(null),2400); };
  const switchMode=(m)=>{ setMode(m); store.saveMode(m); setView("dashboard"); };

  const addExpense=async(exp,receiptData)=>{
    const id=uid(); const record={...exp,id,mode};
    if(receiptData){ const ok=await store.setReceipt(id,receiptData); if(ok) record.hasReceipt=true; }
    const next=[record,...expenses]; setExpenses(next); store.saveExpenses(next);
    notify("Expense saved"); setView("dashboard");
  };
  const deleteExpense=async(id)=>{ const next=expenses.filter(e=>e.id!==id); setExpenses(next); store.saveExpenses(next); store.delReceipt(id); notify("Expense deleted"); };
  const saveRates=(r)=>{ setRates(r); store.saveRates(r); notify("Rates updated"); };
  const saveSettings=(s)=>{ setSettings(s); store.saveSettings(s); AI={apiKey:s.apiKey||"",proxyUrl:s.proxyUrl||""}; notify("Settings saved"); };
  const restore=(list)=>{ setExpenses(list); store.saveExpenses(list); notify("Backup restored"); };

  const scoped=useMemo(()=>expenses.filter(e=>e.mode===mode),[expenses,mode]);

  const nav=[
    {id:"dashboard",label:"Dashboard",icon:"dashboard"},
    {id:"add",label:"Add",icon:"plus"},
    {id:"gallery",label:"Receipts",icon:"images"},
    {id:"assistant",label:"Assistant",icon:"sparkles"},
    {id:"reports",label:"Reports",icon:"file"},
    {id:"settings",label:"Settings",icon:"cog"},
  ];

  if(!loaded) return <div className="min-h-screen flex items-center justify-center bg-[#080A0F]" style={{"--accent":THEMES.business.primary}}><Icon name="loader" size={28} className="spin accent-text"/></div>;

  return (
    <div className={`min-h-screen ${t.app}`} style={{"--accent":theme.primary,"--accent2":theme.secondary,colorScheme:dark?"dark":"light",fontFamily:"'Inter',ui-sans-serif,system-ui,sans-serif"}}>
      {/* Desktop sidebar */}
      <aside className={`no-print hidden md:flex md:flex-col md:fixed md:inset-y-0 md:w-64 ${t.panel} border-r ${t.divide} p-4 gap-1 z-20`}>
        <div className="flex items-center gap-2.5 px-1 pb-4 pt-1">
          <div className="w-9 h-9 rounded-xl accent-grad flex items-center justify-center"><Icon name={theme.icon} size={18} className="text-white"/></div>
          <div><div className="display font-semibold tracking-tight leading-none text-[15px]">Ledger</div><div className={`text-[10px] ${t.faint} mt-1`}>Dual-workspace expenses</div></div>
        </div>
        <WorkspaceSwitch t={t} mode={mode} onSwitch={switchMode}/>
        <div className="h-px my-3 mx-1" style={{background:t.dark?"rgba(255,255,255,0.06)":"#e2e8f0"}}/>
        {nav.map(n=>(
          <button key={n.id} onClick={()=>setView(n.id)} className={`ws-switch flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium ${view===n.id?"accent-bg text-white":t.navIdle}`}>
            <Icon name={n.icon} size={17}/> {n.label}
          </button>
        ))}
        <div className="mt-auto">
          <button onClick={()=>setDark(!dark)} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium ${t.navIdle}`}>
            <Icon name={dark?"sun":"moon"} size={17}/> {dark?"Light mode":"Dark mode"}
          </button>
        </div>
      </aside>

      {/* Mobile top bar */}
      <header className={`no-print md:hidden sticky top-0 z-20 ${t.panel} border-b ${t.divide}`}>
        <div className="flex items-center justify-between px-4 h-14">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-lg accent-grad flex items-center justify-center"><Icon name={theme.icon} size={15} className="text-white"/></div>
            <span className="display font-semibold tracking-tight">Ledger</span>
          </div>
          <button onClick={()=>setDark(!dark)} className={`p-2 rounded-lg ${t.hover}`}><Icon name={dark?"sun":"moon"} size={18}/></button>
        </div>
        <div className="px-3 pb-2.5"><WorkspaceSwitch t={t} mode={mode} onSwitch={switchMode} compact/></div>
      </header>

      <main className="md:pl-64 pb-24 md:pb-0">
        <div className="max-w-6xl mx-auto p-4 md:p-8">
          <div key={mode+view} className="fade-up">
            {view==="dashboard" && <Dashboard t={t} theme={theme} mode={mode} expenses={scoped} setView={setView}/>}
            {view==="add" && <AddExpense t={t} mode={mode} rates={rates} onSave={addExpense} notify={notify} goSettings={()=>setView("settings")}/>}
            {view==="gallery" && <Gallery t={t} mode={mode} expenses={scoped} onDelete={deleteExpense}/>}
            {view==="assistant" && <Assistant t={t} mode={mode} expenses={scoped} goSettings={()=>setView("settings")}/>}
            {view==="reports" && <Reports t={t} theme={theme} mode={mode} expenses={scoped} goSettings={()=>setView("settings")}/>}
            {view==="settings" && <SettingsView t={t} rates={rates} settings={settings} onSaveRates={saveRates} onSaveSettings={saveSettings} expenses={expenses} onRestore={restore} count={expenses.length}/>}
          </div>
        </div>
      </main>

      {/* Mobile bottom nav */}
      <nav className={`no-print md:hidden fixed bottom-0 inset-x-0 z-20 ${t.panel} border-t ${t.divide} flex justify-around px-1 py-1.5 safe-bottom`}>
        {nav.map(n=>(
          <button key={n.id} onClick={()=>setView(n.id)} className={`flex flex-col items-center gap-0.5 px-2 py-1.5 rounded-lg text-[10px] ${view===n.id?"accent-text":t.faint}`}>
            <Icon name={n.icon} size={20}/> {n.label}
          </button>
        ))}
      </nav>

      {toast && <div className="no-print fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl accent-bg text-white text-sm font-medium shadow-lg flex items-center gap-2"><Icon name="check" size={15}/> {toast}</div>}
    </div>
  );
}

/* =================== Workspace switch =================== */
function WorkspaceSwitch({ t, mode, onSwitch, compact }){
  return (
    <div className={`relative flex p-1 rounded-xl ${t.panel2}`}>
      {Object.entries(THEMES).map(([k,v])=>{ const active=mode===k; return (
        <button key={k} onClick={()=>onSwitch(k)} className={`ws-switch relative flex-1 flex items-center justify-center gap-1.5 ${compact?"py-1.5":"py-2"} rounded-lg text-[13px] font-medium ${active?"text-white":t.navIdle}`}>
          {active && <span className="absolute inset-0 rounded-lg" style={{background:`linear-gradient(135deg, ${v.primary}, ${v.secondary})`}}/>}
          <span className="relative flex items-center gap-1.5"><Icon name={v.icon} size={14}/> {v.name}</span>
        </button> ); })}
    </div>
  );
}

/* =================== Dashboard =================== */
function Dashboard({ t, theme, mode, expenses, setView }){
  const now=new Date(); const curM=now.toISOString().slice(0,7);
  const prevM=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,7);
  const year=now.getFullYear().toString(); const business=mode==="business";

  const m=useMemo(()=>{
    const sum=(arr)=>arr.reduce((s,e)=>s+(e.sgdAmount||0),0);
    const ytd=expenses.filter(e=>e.date>=year+"-01");
    const cur=sum(expenses.filter(e=>monthKey(e.date)===curM));
    const prev=sum(expenses.filter(e=>monthKey(e.date)===prevM));
    const ytdSum=sum(ytd); const monthsActive=new Set(ytd.map(e=>monthKey(e.date))).size||1;
    const byCat={},byVendor={},byCountry={},byPay={}; let overseas=0,local=0,reimb=0;
    expenses.forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+e.sgdAmount; byVendor[e.vendor]=(byVendor[e.vendor]||0)+e.sgdAmount;
      byCountry[e.country]=(byCountry[e.country]||0)+e.sgdAmount; byPay[e.paymentMethod]=(byPay[e.paymentMethod]||0)+e.sgdAmount;
      if(e.country===HOME_COUNTRY) local+=e.sgdAmount; else overseas+=e.sgdAmount; if(e.reimbursable) reimb+=e.sgdAmount; });
    const top=(o)=>Object.entries(o).sort((a,b)=>b[1]-a[1])[0]||["—",0];
    const spark=lastNMonths(6).map(({key,label})=>({month:label,total:sum(expenses.filter(e=>monthKey(e.date)===key))}));
    const trend=MONTHS.map((mo,i)=>{ const key=`${year}-${String(i+1).padStart(2,"0")}`;
      const lo=sum(expenses.filter(e=>monthKey(e.date)===key&&e.country===HOME_COUNTRY));
      const ov=sum(expenses.filter(e=>monthKey(e.date)===key&&e.country!==HOME_COUNTRY));
      return {month:mo,total:lo+ov,Local:lo,Overseas:ov}; });
    return { cur,prev,ytdSum,avg:ytdSum/monthsActive,
      catPie:Object.entries(byCat).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value),
      vendors:Object.entries(byVendor).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value).slice(0,8),
      countries:Object.entries(byCountry).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value),
      pay:Object.entries(byPay).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value),
      topCat:top(byCat), topVendor:top(byVendor), overseas, local, reimb,
      overseasPct: overseas+local?Math.round((overseas/(overseas+local))*100):0, spark, trend };
  },[expenses,curM,prevM,year]);

  const delta=m.prev?Math.round(((m.cur-m.prev)/m.prev)*100):0;

  if(!expenses.length) return <Empty t={t} icon={business?"plane":"bag"}
    title={`Your ${theme.name.toLowerCase()} ledger is empty`}
    body={business?"Snap a receipt or add manually — built for travel and reimbursables.":"Track everyday spending. Add manually, or snap a receipt to auto-fill."}
    cta="Add an expense" onCta={()=>setView("add")}/>;

  const insights=buildInsights(m,delta,business);

  return (
    <div className="space-y-6">
      <div className={`${t.panel} rounded-2xl overflow-hidden relative`}>
        <div className="absolute inset-0 accent-grad-soft pointer-events-none"/>
        <div className="relative p-5 md:p-7 grid lg:grid-cols-[1.2fr_1fr] gap-6 items-center">
          <div>
            <div className={`text-[11px] uppercase tracking-[0.16em] ${t.faint} flex items-center gap-2`}><Icon name={theme.icon} size={13} className="accent-text"/> {theme.name} · {now.toLocaleDateString("en-SG",{month:"long"})}</div>
            <div className="mono text-4xl md:text-5xl font-bold mt-2 leading-none">{fmt(m.cur)}</div>
            <div className="flex items-center gap-3 mt-3">
              {m.prev>0 && <span className={`inline-flex items-center gap-1 text-xs font-medium px-2 py-1 rounded-full ${delta>0?"text-rose-400 bg-rose-500/10":"text-emerald-400 bg-emerald-500/10"}`}><Icon name={delta>0?"upright":"downright"} size={13}/> {Math.abs(delta)}% vs last month</span>}
              <span className={`text-xs ${t.faint}`}>YTD {fmt(m.ytdSum)}</span>
            </div>
          </div>
          <div className="h-24 md:h-28">
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={m.spark} margin={{top:6,bottom:0,left:0,right:0}}>
                <defs><linearGradient id="sparkFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={theme.primary} stopOpacity={0.35}/><stop offset="100%" stopColor={theme.primary} stopOpacity={0}/></linearGradient></defs>
                <Tooltip contentStyle={tip(t)} formatter={(v)=>fmt(v)} labelStyle={{color:t.axis}}/>
                <Area type="monotone" dataKey="total" stroke={theme.primary} strokeWidth={2.5} fill="url(#sparkFill)" dot={false}/>
                <XAxis dataKey="month" tick={{fill:t.axis,fontSize:10}} axisLine={false} tickLine={false}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        {business ? <>
          <Kpi t={t} label="Reimbursable" value={fmt(m.reimb)} accent foot={<span className="accent-text font-medium">Outstanding</span>}/>
          <Kpi t={t} label="Overseas share" value={m.overseasPct+"%"} foot={<span className={t.faint}>{fmt(m.overseas)} abroad</span>}/>
          <Kpi t={t} label="Top category" value={m.topCat[0]} small foot={<span className={t.faint}>{fmt(m.topCat[1])}</span>}/>
          <Kpi t={t} label="Avg / month" value={fmt(m.avg)} foot={<span className={t.faint}>this year</span>}/>
        </> : <>
          <Kpi t={t} label="Year to date" value={fmt(m.ytdSum)} foot={<span className={t.faint}>{expenses.length} items</span>}/>
          <Kpi t={t} label="Avg / month" value={fmt(m.avg)} foot={<span className={t.faint}>this year</span>}/>
          <Kpi t={t} label="Top category" value={m.topCat[0]} small foot={<span className={t.faint}>{fmt(m.topCat[1])}</span>}/>
          <Kpi t={t} label="Biggest vendor" value={m.topVendor[0]} small foot={<span className={t.faint}>{fmt(m.topVendor[1])}</span>}/>
        </>}
      </div>

      <div className={`${t.panel} rounded-2xl p-4`}>
        <div className="flex items-center gap-2 mb-3"><Icon name="sparkles" size={15} className="accent-text"/><span className="text-sm font-semibold">Insights</span></div>
        <div className="flex flex-wrap gap-2">{insights.map((i,k)=><span key={k} className={`text-xs px-3 py-1.5 rounded-full ${t.chip}`}>{i}</span>)}</div>
      </div>

      <div className="grid lg:grid-cols-2 gap-4">
        <Card t={t} title="Monthly spending" sub={year}>
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={m.trend} margin={{left:-16,right:8,top:8}}>
              <CartesianGrid strokeDasharray="3 3" stroke={t.grid} vertical={false}/>
              <XAxis dataKey="month" tick={{fill:t.axis,fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:t.axis,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={fmtShort}/>
              <Tooltip contentStyle={tip(t)} formatter={(v)=>fmt(v)}/>
              <Line type="monotone" dataKey="total" stroke={theme.primary} strokeWidth={2.5} dot={false}/>
            </LineChart>
          </ResponsiveContainer>
        </Card>

        {business ? (
          <Card t={t} title="Local vs overseas" sub="by month">
            <ResponsiveContainer width="100%" height={240}>
              <BarChart data={m.trend} margin={{left:-16,right:8,top:8}}>
                <CartesianGrid strokeDasharray="3 3" stroke={t.grid} vertical={false}/>
                <XAxis dataKey="month" tick={{fill:t.axis,fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:t.axis,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={fmtShort}/>
                <Tooltip contentStyle={tip(t)} formatter={(v)=>fmt(v)}/>
                <Bar dataKey="Local" stackId="a" fill={theme.secondary}/>
                <Bar dataKey="Overseas" stackId="a" fill={theme.primary} radius={[4,4,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>
        ) : (
          <Card t={t} title="Payment methods">
            <ResponsiveContainer width="100%" height={240}>
              <PieChart>
                <Pie data={m.pay} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={52} outerRadius={84} paddingAngle={2}>{m.pay.map((_,i)=><Cell key={i} fill={theme.chart[i%theme.chart.length]}/>)}</Pie>
                <Tooltip contentStyle={tip(t)} formatter={(v)=>fmt(v)}/>
              </PieChart>
            </ResponsiveContainer>
            <Legend2 t={t} theme={theme} data={m.pay}/>
          </Card>
        )}

        <Card t={t} title="Category breakdown">
          <ResponsiveContainer width="100%" height={240}>
            <PieChart>
              <Pie data={m.catPie} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={52} outerRadius={84} paddingAngle={2}>{m.catPie.map((_,i)=><Cell key={i} fill={theme.chart[i%theme.chart.length]}/>)}</Pie>
              <Tooltip contentStyle={tip(t)} formatter={(v)=>fmt(v)}/>
            </PieChart>
          </ResponsiveContainer>
          <Legend2 t={t} theme={theme} data={m.catPie}/>
        </Card>

        {business ? (
          <Card t={t} title="Spending by country">
            <ResponsiveContainer width="100%" height={240}>
              <BarChart data={m.countries} layout="vertical" margin={{left:24,right:12}}>
                <CartesianGrid strokeDasharray="3 3" stroke={t.grid} horizontal={false}/>
                <XAxis type="number" tick={{fill:t.axis,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={fmtShort}/>
                <YAxis type="category" dataKey="name" width={84} tick={{fill:t.axis,fontSize:11}} axisLine={false} tickLine={false}/>
                <Tooltip contentStyle={tip(t)} formatter={(v)=>fmt(v)}/>
                <Bar dataKey="value" fill={theme.primary} radius={[0,4,4,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>
        ) : (
          <Card t={t} title="Top vendors">
            <ResponsiveContainer width="100%" height={240}>
              <BarChart data={m.vendors} layout="vertical" margin={{left:30,right:12}}>
                <CartesianGrid strokeDasharray="3 3" stroke={t.grid} horizontal={false}/>
                <XAxis type="number" tick={{fill:t.axis,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={fmtShort}/>
                <YAxis type="category" dataKey="name" width={92} tick={{fill:t.axis,fontSize:10}} axisLine={false} tickLine={false}/>
                <Tooltip contentStyle={tip(t)} formatter={(v)=>fmt(v)}/>
                <Bar dataKey="value" fill={theme.secondary} radius={[0,4,4,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>
        )}
      </div>
    </div>
  );
}
function buildInsights(m,delta,business){
  const out=[];
  if(m.prev) out.push(`Spending ${delta>=0?"rose":"fell"} ${Math.abs(delta)}% vs last month`);
  out.push(`Top category: ${m.topCat[0]} (${fmt(m.topCat[1])})`);
  if(business){ if(m.countries[0]&&m.countries[0].name!==HOME_COUNTRY&&m.overseas) out.push(`${m.countries[0].name} is ${Math.round((m.countries[0].value/m.overseas)*100)}% of overseas spend`);
    if(m.reimb) out.push(`${fmt(m.reimb)} reimbursable outstanding`); }
  else { out.push(`Biggest vendor: ${m.topVendor[0]}`); out.push(`Average ${fmt(m.avg)}/month this year`); }
  return out;
}

/* =================== Add expense =================== */
const blankForm=(mode)=>{ const cats=CATEGORY_SETS[mode]; const fc=Object.keys(cats)[0];
  return { date:todayISO(),amount:"",currency:"SGD",vendor:"",category:fc,subcategory:cats[fc][0],description:"",
    paymentMethod:mode==="business"?"Corporate Card":"Credit Card",country:"Singapore",city:"Singapore",
    project:"",client:"",reimbursable:mode==="business",tax:"",receiptNumber:"",rateOverride:"" }; };

function AddExpense({ t, mode, rates, onSave, notify, goSettings }){
  const CATS=CATEGORY_SETS[mode]; const business=mode==="business";
  const [f,setF]=useState(blankForm(mode));
  const [receipt,setReceipt]=useState(null);
  const [scanning,setScanning]=useState(false);
  const fileRef=useRef();
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{ setF(blankForm(mode)); setReceipt(null); },[mode]);
  const rate=f.rateOverride?Number(f.rateOverride):(rates[f.currency]||1);
  const sgd=(Number(f.amount)||0)*rate;

  const onFile=async(file)=>{ if(!file) return; const isPdf=file.type==="application/pdf"; let data;
    if(isPdf) data=await new Promise(r=>{const fr=new FileReader();fr.onload=(e)=>r(e.target.result);fr.readAsDataURL(file);}); else data=await downscaleImage(file);
    setReceipt({data,isPdf}); if(aiEnabled()) await scan(data,isPdf); else notify("Receipt attached · add an API key in Settings to auto-fill"); };

  const scan=async(data,isPdf)=>{ setScanning(true);
    try{ const b64=data.split(",")[1];
      const block=isPdf?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}:{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}};
      const txt=await callClaude([{role:"user",content:[block,{type:"text",text:`Extract this receipt/invoice. Return ONLY JSON, no prose:
{"vendor":"","date":"YYYY-MM-DD","amount":0,"currency":"3-letter","tax":0,"receiptNumber":"","country":"","city":"","category":"","subcategory":""}
Pick category/subcategory from: ${JSON.stringify(CATS)}. Currency one of ${CURRENCIES.join(",")}. Unknown: "" or 0.`}]}],
        "You are a precise receipt data extractor. Output strict JSON only.",700);
      const j=parseJSON(txt);
      if(j){ setF(p=>({...p, vendor:j.vendor||p.vendor, date:/^\d{4}-\d{2}-\d{2}$/.test(j.date)?j.date:p.date,
        amount:j.amount?String(j.amount):p.amount, currency:CURRENCIES.includes(j.currency)?j.currency:p.currency,
        tax:j.tax?String(j.tax):p.tax, receiptNumber:j.receiptNumber||p.receiptNumber,
        country:COUNTRIES.includes(j.country)?j.country:(j.country?"Other":p.country), city:j.city||p.city,
        category:CATS[j.category]?j.category:p.category, subcategory:(CATS[j.category]||[]).includes(j.subcategory)?j.subcategory:p.subcategory })); notify("Receipt scanned"); }
      else notify("Couldn't read receipt — enter manually");
    }catch(e){ if(e&&e.noai) notify("Add an API key in Settings to scan"); else notify("Scan failed — enter manually"); }
    setScanning(false); };

  const submit=()=>{ if(!f.amount||!f.vendor){ notify("Add a vendor and amount"); return; }
    onSave({ date:f.date,amount:Number(f.amount),currency:f.currency,exchangeRate:rate,sgdAmount:sgd,vendor:f.vendor.trim(),
      category:f.category,subcategory:f.subcategory,description:f.description.trim(),paymentMethod:f.paymentMethod,country:f.country,city:f.city.trim(),
      project:business?f.project.trim():"",client:business?f.client.trim():"",reimbursable:business?f.reimbursable:false,
      tax:Number(f.tax)||0,receiptNumber:f.receiptNumber,createdAt:new Date().toISOString() }, receipt?receipt.data:null); };

  return (
    <div className="space-y-6 max-w-3xl">
      <Header t={t} title={`Add ${business?"business":"personal"} expense`} sub="Upload a receipt for auto-fill, or enter it by hand"/>
      <div onClick={()=>fileRef.current?.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();onFile(e.dataTransfer.files[0]);}}
        className={`${t.panel} rounded-2xl border-2 border-dashed accent-border cursor-pointer p-6 text-center ${t.hover}`}>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={e=>onFile(e.target.files[0])}/>
        {scanning ? <div className="flex flex-col items-center gap-2 py-2"><Icon name="loader" size={22} className="spin accent-text"/><span className="text-sm">Reading receipt…</span></div>
          : receipt ? <div className="flex flex-col items-center gap-2">{receipt.isPdf?<div className={`px-4 py-3 rounded-lg ${t.chip} text-sm flex items-center gap-2`}><Icon name="file" size={16}/> PDF attached</div>:<img src={receipt.data} alt="receipt" className="max-h-40 rounded-lg"/>}<span className={`text-xs ${t.faint}`}>Tap to replace</span></div>
          : <div className="flex flex-col items-center gap-2 py-2"><div className="w-11 h-11 rounded-xl accent-soft flex items-center justify-center"><Icon name="wand" size={20} className="accent-text"/></div><div className="text-sm font-medium">Drop a receipt, photo, screenshot or PDF</div><div className={`text-xs ${t.faint}`}>{aiEnabled()?"Claude extracts vendor, amount, date, tax & category":"Attach now · enable AI scanning in Settings"}</div></div>}
      </div>

      <div className={`${t.panel} rounded-2xl p-5 grid sm:grid-cols-2 gap-4`}>
        <Field t={t} label="Vendor"><input className={inp(t)} value={f.vendor} onChange={e=>set("vendor",e.target.value)} placeholder={business?"e.g. Grab, Marriott":"e.g. NTUC, Shopee"}/></Field>
        <Field t={t} label="Date"><input type="date" className={inp(t)} value={f.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field t={t} label="Amount"><input type="number" step="0.01" className={inp(t)} value={f.amount} onChange={e=>set("amount",e.target.value)} placeholder="0.00"/></Field>
        <Field t={t} label="Currency"><select className={inp(t)} value={f.currency} onChange={e=>set("currency",e.target.value)}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></Field>
        <Field t={t} label="Category"><select className={inp(t)} value={f.category} onChange={e=>{const c=e.target.value;setF(p=>({...p,category:c,subcategory:CATS[c][0]}));}}>{Object.keys(CATS).map(c=><option key={c}>{c}</option>)}</select></Field>
        <Field t={t} label="Subcategory"><select className={inp(t)} value={f.subcategory} onChange={e=>set("subcategory",e.target.value)}>{CATS[f.category].map(s=><option key={s}>{s}</option>)}</select></Field>
        <Field t={t} label="Country"><select className={inp(t)} value={f.country} onChange={e=>set("country",e.target.value)}>{COUNTRIES.map(c=><option key={c}>{c}</option>)}</select></Field>
        <Field t={t} label="City"><input className={inp(t)} value={f.city} onChange={e=>set("city",e.target.value)}/></Field>
        <Field t={t} label="Payment method"><select className={inp(t)} value={f.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>{PAYMENT_METHODS.map(p=><option key={p}>{p}</option>)}</select></Field>
        <Field t={t} label={`Exchange rate → SGD ${f.currency==="SGD"?"(n/a)":""}`}><input className={inp(t)} value={f.rateOverride} onChange={e=>set("rateOverride",e.target.value)} placeholder={String(rates[f.currency]||1)} disabled={f.currency==="SGD"}/></Field>
        {business && <><Field t={t} label="Project / Job no. (optional)"><input className={inp(t)} value={f.project} onChange={e=>set("project",e.target.value)}/></Field>
          <Field t={t} label="Client (optional)"><input className={inp(t)} value={f.client} onChange={e=>set("client",e.target.value)}/></Field></>}
        <Field t={t} label="Description" full><input className={inp(t)} value={f.description} onChange={e=>set("description",e.target.value)} placeholder="Notes…"/></Field>
        {business && <label className="flex items-center gap-2.5 sm:col-span-2 text-sm cursor-pointer select-none"><input type="checkbox" checked={f.reimbursable} onChange={e=>set("reimbursable",e.target.checked)} className="w-4 h-4" style={{accentColor:"var(--accent)"}}/> Reimbursable — claim from company</label>}
        <div className="sm:col-span-2 flex items-center justify-between pt-1">
          <div className="text-sm"><span className={t.faint}>Converted</span><span className="ml-2 mono text-lg font-semibold">{fmt(sgd)}</span>{f.currency!=="SGD"&&<span className={`ml-2 text-xs ${t.faint}`}>@ {rate}</span>}</div>
          <button onClick={submit} className="px-5 py-2.5 rounded-xl accent-bg text-white text-sm font-semibold flex items-center gap-2"><Icon name="check" size={16}/> Save expense</button>
        </div>
      </div>
    </div>
  );
}

/* =================== Gallery =================== */
function Gallery({ t, mode, expenses, onDelete }){
  const business=mode==="business";
  const [q,setQ]=useState(""); const [open,setOpen]=useState(null); const [img,setImg]=useState(null);
  const filtered=expenses.filter(e=>{ if(!q) return true; const s=q.toLowerCase();
    return e.vendor.toLowerCase().includes(s)||(e.description||"").toLowerCase().includes(s)||e.date.includes(s)||String(e.amount).includes(s)||e.country.toLowerCase().includes(s)||e.category.toLowerCase().includes(s); });
  const viewOne=async(e)=>{ setOpen(e); setImg(null); if(e.hasReceipt) setImg(await store.getReceipt(e.id)); };
  if(!expenses.length) return <Empty t={t} icon="receipt" title="No receipts yet" body="Saved expenses and their receipts show up here, fully searchable."/>;
  return (
    <div className="space-y-5">
      <Header t={t} title="Receipts" sub={`${expenses.length} ${business?"business":"personal"} item${expenses.length>1?"s":""} archived`}/>
      <div className={`flex items-center gap-2 px-3 ${t.input} rounded-xl`}><Icon name="search" size={16} className={t.faint}/><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search vendor, amount, date, country, category…" className="flex-1 bg-transparent py-2.5 text-sm outline-none"/></div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        {filtered.map(e=>(
          <div key={e.id} className={`${t.panel} rounded-xl p-4 ${t.hover} cursor-pointer`} onClick={()=>viewOne(e)}>
            <div className="flex items-start justify-between gap-2"><div className="min-w-0"><div className="font-medium truncate">{e.vendor}</div><div className={`text-xs ${t.faint} mt-0.5`}>{e.date} · {e.city||e.country}</div></div>
              <div className="text-right shrink-0"><div className="mono font-semibold">{fmt(e.sgdAmount)}</div>{e.currency!=="SGD"&&<div className={`text-[11px] ${t.faint}`}>{e.currency} {e.amount}</div>}</div></div>
            <div className="flex items-center gap-1.5 mt-3 flex-wrap"><Tag t={t}>{e.category}</Tag>{e.country!==HOME_COUNTRY?<Tag t={t} accent><Icon name="globe" size={11}/> {e.country}</Tag>:<Tag t={t}><Icon name="pin" size={11}/> Local</Tag>}{e.reimbursable&&<Tag t={t} accent2>Reimbursable</Tag>}{e.hasReceipt&&<Tag t={t}><Icon name="receipt" size={11}/></Tag>}</div>
          </div>
        ))}
      </div>
      {open && (
        <div className="no-print fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={()=>setOpen(null)}>
          <div className={`${t.panel} rounded-2xl max-w-lg w-full max-h-[90vh] overflow-auto`} onClick={e=>e.stopPropagation()}>
            <div className={`flex items-center justify-between p-4 border-b ${t.divide}`}><div className="font-semibold">{open.vendor}</div><button onClick={()=>setOpen(null)} className={`p-1.5 rounded-lg ${t.hover}`}><Icon name="x" size={18}/></button></div>
            <div className="p-4 space-y-3">
              {open.hasReceipt && (img?(img.startsWith("data:application/pdf")?<a href={img} target="_blank" rel="noreferrer" className="block text-center accent-text text-sm underline py-6">Open PDF receipt</a>:<img src={img} alt="receipt" className="w-full rounded-lg"/>):<div className="flex justify-center py-8"><Icon name="loader" className="spin accent-text"/></div>)}
              <div className="grid grid-cols-2 gap-y-2 gap-x-4 text-sm">
                <Detail t={t} k="Amount" v={`${open.currency} ${open.amount} · ${fmt(open.sgdAmount)}`}/><Detail t={t} k="Date" v={open.date}/>
                <Detail t={t} k="Category" v={`${open.category} › ${open.subcategory}`}/><Detail t={t} k="Payment" v={open.paymentMethod}/>
                <Detail t={t} k="Location" v={`${open.city||"—"}, ${open.country}`}/><Detail t={t} k="Tax/GST" v={open.tax?fmt(open.tax):"—"}/>
                {open.receiptNumber&&<Detail t={t} k="Receipt #" v={open.receiptNumber}/>}{open.project&&<Detail t={t} k="Project" v={open.project}/>}{open.client&&<Detail t={t} k="Client" v={open.client}/>}{open.description&&<Detail t={t} k="Notes" v={open.description}/>}
              </div>
              <button onClick={()=>{onDelete(open.id);setOpen(null);}} className="w-full mt-2 py-2.5 rounded-xl border border-rose-500/30 text-rose-400 text-sm font-medium flex items-center justify-center gap-2 hover:bg-rose-500/10"><Icon name="trash" size={15}/> Delete expense</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* =================== Assistant =================== */
function Assistant({ t, mode, expenses, goSettings }){
  const business=mode==="business";
  const [msgs,setMsgs]=useState([]); const [input,setInput]=useState(""); const [busy,setBusy]=useState(false); const endRef=useRef();
  useEffect(()=>{ setMsgs([{role:"assistant",text:business?"Ask about your business spend — reimbursables outstanding, totals by country or client, biggest travel costs.":"Ask about your personal spend — totals by category, biggest splurge this month, how groceries compare."}]); },[mode]);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[msgs,busy]);
  const suggestions=business?["Reimbursable outstanding this year","Total spend in Thailand","Largest hotel expense","Singapore vs overseas"]:["How much did I spend last month?","Top 3 categories this year","Biggest single expense","Dining vs groceries"];

  if(!aiEnabled()) return (
    <div className="max-w-3xl">
      <Header t={t} title="Financial assistant" sub="Ask questions about your spending"/>
      <div className={`${t.panel} rounded-2xl p-6 mt-5 text-center`}>
        <div className="w-12 h-12 rounded-2xl accent-soft flex items-center justify-center mx-auto mb-3"><Icon name="key" size={22} className="accent-text"/></div>
        <div className="font-semibold">Turn on the assistant</div>
        <p className={`text-sm ${t.sub} mt-1 max-w-sm mx-auto`}>Add your Anthropic API key in Settings to enable the AI assistant and receipt scanning. Everything else works without it.</p>
        <button onClick={goSettings} className="mt-4 px-5 py-2.5 rounded-xl accent-bg text-white text-sm font-semibold">Open Settings</button>
      </div>
    </div>
  );

  const send=async(text)=>{ const q=(text??input).trim(); if(!q||busy) return;
    setMsgs(m=>[...m,{role:"user",text:q}]); setInput(""); setBusy(true);
    const compact=expenses.map(e=>({date:e.date,sgd:Math.round(e.sgdAmount*100)/100,ccy:e.currency,amt:e.amount,vendor:e.vendor,cat:e.category,sub:e.subcategory,country:e.country,city:e.city,pay:e.paymentMethod,reimbursable:e.reimbursable,project:e.project,client:e.client}));
    try{ const answer=await callClaude([{role:"user",content:`Question: ${q}\n\n${business?"Business":"Personal"} expense data (amounts already in SGD under "sgd"):\n${JSON.stringify(compact)}`}],
      `You are a financial assistant inside the ${business?"Business":"Personal"} workspace. Today is ${todayISO()}. Home country Singapore, currency SGD. Answer ONLY from the data. Do the maths carefully. Be concise, use S$ formatting. ${business?"Note reimbursable, project and client fields.":""} If data is missing, say so.`,900);
      setMsgs(m=>[...m,{role:"assistant",text:answer||"I couldn't work that out."}]);
    }catch(e){ setMsgs(m=>[...m,{role:"assistant",text:"Something went wrong reaching the model. Check your API key in Settings and try again."}]); }
    setBusy(false); };

  return (
    <div className="flex flex-col h-[calc(100vh-11rem)] md:h-[calc(100vh-5rem)] max-w-3xl">
      <Header t={t} title="Financial assistant" sub={`Reads your saved ${business?"business":"personal"} expenses`}/>
      <div className="flex-1 overflow-auto space-y-3 py-4">
        {msgs.map((m,i)=><div key={i} className={`flex ${m.role==="user"?"justify-end":"justify-start"}`}><div className={`max-w-[85%] px-4 py-2.5 rounded-2xl text-sm whitespace-pre-wrap leading-relaxed ${m.role==="user"?"accent-bg text-white rounded-br-sm":`${t.panel} rounded-bl-sm`}`}>{m.text}</div></div>)}
        {busy && <div className="flex justify-start"><div className={`${t.panel} px-4 py-3 rounded-2xl rounded-bl-sm`}><Icon name="loader" size={15} className="spin accent-text"/></div></div>}
        <div ref={endRef}/>
      </div>
      {msgs.length<=1 && <div className="flex flex-wrap gap-2 pb-3">{suggestions.map(s=><button key={s} onClick={()=>send(s)} className={`text-xs px-3 py-1.5 rounded-full ${t.chip} ${t.hover}`}>{s}</button>)}</div>}
      <div className={`flex items-center gap-2 px-3 ${t.input} rounded-xl mb-1`}><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask about your spending…" className="flex-1 bg-transparent py-3 text-sm outline-none"/><button onClick={()=>send()} disabled={busy} className="p-2 rounded-lg accent-text disabled:opacity-40"><Icon name="send" size={18}/></button></div>
    </div>
  );
}

/* =================== Reports =================== */
function Reports({ t, theme, mode, expenses, goSettings }){
  const business=mode==="business";
  const months=useMemo(()=>{ const s=new Set(expenses.map(e=>monthKey(e.date))); return ["All time",...[...s].sort().reverse()]; },[expenses]);
  const [sel,setSel]=useState("All time"); const [aiSummary,setAiSummary]=useState(""); const [busy,setBusy]=useState(false);
  const rows=sel==="All time"?expenses:expenses.filter(e=>monthKey(e.date)===sel);
  const total=rows.reduce((s,e)=>s+e.sgdAmount,0); const reimb=rows.filter(e=>e.reimbursable).reduce((s,e)=>s+e.sgdAmount,0);
  const overseas=rows.filter(e=>e.country!==HOME_COUNTRY).reduce((s,e)=>s+e.sgdAmount,0);
  const byCat={}; rows.forEach(e=>byCat[e.category]=(byCat[e.category]||0)+e.sgdAmount);
  const byCountry={}; rows.forEach(e=>byCountry[e.country]=(byCountry[e.country]||0)+e.sgdAmount);

  const exportCSV=()=>{ const head=["Workspace","Date","Vendor","Category","Subcategory","Currency","Amount","Rate","SGD","Tax","Country","City","Payment","Reimbursable","Project","Client","Receipt#","Description"];
    const lines=rows.map(e=>[mode,e.date,e.vendor,e.category,e.subcategory,e.currency,e.amount,e.exchangeRate,e.sgdAmount.toFixed(2),e.tax||0,e.country,e.city,e.paymentMethod,e.reimbursable?"Yes":"No",e.project,e.client,e.receiptNumber,e.description].map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(","));
    const csv=[head.join(","),...lines].join("\n"); const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a"); a.href=url; a.download=`${mode}_expenses_${sel.replace(/\s/g,"_")}.csv`; a.click(); URL.revokeObjectURL(url); };

  const genSummary=async()=>{ if(!aiEnabled()){ setAiSummary("Add your API key in Settings to generate AI summaries."); return; } setBusy(true);
    try{ const data={workspace:mode,period:sel,total,reimbursable:reimb,overseas,byCategory:byCat,byCountry,count:rows.length};
      const txt=await callClaude([{role:"user",content:`Write a tight 3-4 sentence executive summary for a ${business?"business":"personal"} expense report. Data (SGD):\n${JSON.stringify(data)}`}],
        `You write concise, professional expense report summaries. ${business?"Emphasise reimbursables, travel and overseas split.":"Keep it plain and practical for personal budgeting."} Plain prose, use S$.`,500);
      setAiSummary(txt);
    }catch{ setAiSummary("Couldn't generate summary."); } setBusy(false); };

  if(!expenses.length) return <Empty t={t} icon="file" title="Nothing to report yet" body="Add expenses and you can export them here for reimbursement and accounting."/>;
  return (
    <div className="space-y-5">
      <div className="no-print flex flex-wrap items-center justify-between gap-3">
        <Header t={t} title={`${theme.name} report`} sub="Export for reimbursement & accounting"/>
        <div className="flex items-center gap-2">
          <select value={sel} onChange={e=>{setSel(e.target.value);setAiSummary("");}} className={`${inp(t)} w-auto`}>{months.map(m=><option key={m}>{m}</option>)}</select>
          <button onClick={exportCSV} className={`px-3 py-2 rounded-xl text-sm font-medium flex items-center gap-2 ${t.chip} ${t.hover}`}><Icon name="download" size={15}/> CSV</button>
          <button onClick={()=>window.print()} className={`px-3 py-2 rounded-xl text-sm font-medium flex items-center gap-2 ${t.chip} ${t.hover}`}><Icon name="printer" size={15}/> PDF</button>
        </div>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        <Kpi t={t} label="Total" value={fmt(total)} foot={<span className={t.faint}>{rows.length} items</span>}/>
        {business?<Kpi t={t} label="Reimbursable" value={fmt(reimb)} accent foot={<span className="accent-text font-medium">Claimable</span>}/>:<Kpi t={t} label="Categories" value={String(Object.keys(byCat).length)} foot={<span className={t.faint}>in period</span>}/>}
        <Kpi t={t} label="Overseas" value={fmt(overseas)} foot={<span className={t.faint}>{total?Math.round(overseas/total*100):0}% of total</span>}/>
        <Kpi t={t} label="Local" value={fmt(total-overseas)} foot={<span className={t.faint}>Singapore</span>}/>
      </div>
      <div className={`${t.panel} rounded-2xl p-5`}>
        <div className="flex items-center justify-between mb-3"><div className="flex items-center gap-2"><Icon name="sparkles" size={15} className="accent-text"/><span className="text-sm font-semibold">Executive summary</span></div>
          <button onClick={genSummary} disabled={busy} className="no-print text-xs px-3 py-1.5 rounded-full accent-bg text-white flex items-center gap-1.5 disabled:opacity-50">{busy?<Icon name="loader" size={12} className="spin"/>:<Icon name="wand" size={12}/>} Generate</button></div>
        <p className={`text-sm leading-relaxed ${aiSummary?"":t.faint}`}>{aiSummary||"Generate an AI summary of this period's spending."}</p>
      </div>
      <div className={`${t.panel} rounded-2xl overflow-hidden`}><div className="overflow-x-auto"><table className="w-full text-sm">
        <thead><tr className={`text-left ${t.faint} text-xs border-b ${t.divide}`}><th className="px-4 py-3 font-medium">Date</th><th className="px-4 py-3 font-medium">Vendor</th><th className="px-4 py-3 font-medium">Category</th><th className="px-4 py-3 font-medium">Country</th><th className="px-4 py-3 font-medium text-right">SGD</th></tr></thead>
        <tbody>{rows.map(e=>(<tr key={e.id} className={`border-b ${t.divide}`}><td className="px-4 py-2.5 whitespace-nowrap mono text-xs">{e.date}</td><td className="px-4 py-2.5">{e.vendor}{e.reimbursable&&<span className="ml-1.5 text-[10px] accent-text">●</span>}</td><td className={`px-4 py-2.5 ${t.faint}`}>{e.category}</td><td className="px-4 py-2.5">{e.country}</td><td className="px-4 py-2.5 text-right mono font-medium">{fmt(e.sgdAmount)}</td></tr>))}</tbody>
      </table></div></div>
    </div>
  );
}

/* =================== Settings =================== */
function SettingsView({ t, rates, settings, onSaveRates, onSaveSettings, expenses, onRestore, count }){
  const [draft,setDraft]=useState(rates);
  const [key,setKey]=useState(settings.apiKey||"");
  const [proxy,setProxy]=useState(settings.proxyUrl||"");
  const importRef=useRef();

  const exportBackup=()=>{ const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),expenses,rates},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`ledger_backup_${todayISO()}.json`; a.click(); URL.revokeObjectURL(url); };
  const importBackup=(file)=>{ if(!file) return; const fr=new FileReader(); fr.onload=()=>{ try{ const j=JSON.parse(fr.result); if(Array.isArray(j.expenses)) onRestore(j.expenses); }catch{} }; fr.readAsText(file); };

  return (
    <div className="space-y-5 max-w-2xl">
      <Header t={t} title="Settings" sub="AI, exchange rates & data"/>

      <div className={`${t.panel} rounded-2xl p-5`}>
        <div className="flex items-center gap-2 mb-1"><Icon name="key" size={15} className="accent-text"/><span className="text-sm font-semibold">AI features</span></div>
        <p className={`text-xs ${t.faint} mb-4`}>Powers receipt scanning and the assistant. Paste your Anthropic API key — it's stored only on this device and sent straight to Anthropic. For a shared device or extra safety, point to your own proxy URL instead and leave the key blank.</p>
        <Field t={t} label="Anthropic API key (sk-ant-…)"><input className={inp(t)} type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-…"/></Field>
        <div className="mt-3"><Field t={t} label="Or proxy URL (optional, overrides key)"><input className={inp(t)} value={proxy} onChange={e=>setProxy(e.target.value)} placeholder="https://your-vps/anthropic"/></Field></div>
        <button onClick={()=>onSaveSettings({apiKey:key.trim(),proxyUrl:proxy.trim()})} className="mt-4 px-4 py-2 rounded-xl accent-bg text-white text-sm font-semibold">Save AI settings</button>
        <div className={`mt-3 text-[11px] ${t.faint}`}>{aiEnabled()?"AI is enabled.":"AI is off — manual entry, dashboards and reports still work fully."}</div>
      </div>

      <div className={`${t.panel} rounded-2xl p-5`}>
        <div className="text-sm font-semibold mb-1">Exchange rates → SGD</div>
        <p className={`text-xs ${t.faint} mb-4`}>Shared across both workspaces. Edit to match your card's posted rate; you can also override per expense.</p>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">{CURRENCIES.filter(c=>c!=="SGD").map(c=>(<Field t={t} key={c} label={c}><input className={inp(t)} type="number" step="0.0001" value={draft[c]} onChange={e=>setDraft(d=>({...d,[c]:Number(e.target.value)}))}/></Field>))}</div>
        <button onClick={()=>onSaveRates(draft)} className="mt-4 px-4 py-2 rounded-xl accent-bg text-white text-sm font-semibold">Save rates</button>
      </div>

      <div className={`${t.panel} rounded-2xl p-5`}>
        <div className="text-sm font-semibold mb-1">Backup & restore</div>
        <p className={`text-xs ${t.faint} mb-4`}>{count} expense{count!==1?"s":""} stored on this device (both workspaces). Export a backup before clearing your browser or switching phones.</p>
        <div className="flex flex-wrap gap-2">
          <button onClick={exportBackup} className={`px-3 py-2 rounded-xl text-sm font-medium flex items-center gap-2 ${t.chip} ${t.hover}`}><Icon name="download" size={15}/> Export backup</button>
          <button onClick={()=>importRef.current?.click()} className={`px-3 py-2 rounded-xl text-sm font-medium flex items-center gap-2 ${t.chip} ${t.hover}`}><Icon name="upload" size={15}/> Restore from file</button>
          <input ref={importRef} type="file" accept="application/json" className="hidden" onChange={e=>importBackup(e.target.files[0])}/>
        </div>
      </div>

      <div className={`${t.panel} rounded-2xl p-4 text-xs ${t.faint} flex gap-2`}><Icon name="alert" size={15} className="shrink-0 mt-0.5"/>Your data lives in this browser only (local storage + offline database). It survives app restarts and works offline; it does not sync between devices. Use Export/Restore to move it.</div>
    </div>
  );
}

/* =================== Primitives =================== */
const inp=(t)=>`w-full rounded-lg px-3 py-2 text-sm focus-accent ${t.input}`;
const tip=(t)=>({background:t.tipBg,border:`1px solid ${t.tipBorder}`,borderRadius:10,fontSize:12,color:t.tipText});
function Header({ t, title, sub }){ return <div><h1 className="display text-xl md:text-2xl font-semibold tracking-tight">{title}</h1>{sub&&<p className={`text-sm ${t.sub} mt-0.5`}>{sub}</p>}</div>; }
function Kpi({ t, label, value, foot, accent, small }){ return <div className={`${t.panel} rounded-2xl p-4 ${accent?"accent-border":""}`} style={accent?{borderWidth:1}:{}}><div className={`text-xs ${t.faint}`}>{label}</div><div className={`${small?"text-base md:text-lg truncate":"mono text-xl md:text-2xl"} font-semibold tracking-tight mt-1`}>{value}</div><div className="text-[11px] mt-1.5">{foot}</div></div>; }
function Card({ t, title, sub, children }){ return <div className={`${t.panel} rounded-2xl p-4`}><div className="flex items-baseline justify-between mb-2"><span className="text-sm font-semibold">{title}</span>{sub&&<span className={`text-xs ${t.faint}`}>{sub}</span>}</div>{children}</div>; }
function Legend2({ t, theme, data }){ return <div className="flex flex-wrap gap-x-3 gap-y-1 mt-2">{data.slice(0,8).map((d,i)=><span key={d.name} className={`flex items-center gap-1.5 text-[11px] ${t.faint}`}><span className="w-2 h-2 rounded-full" style={{background:theme.chart[i%theme.chart.length]}}/> {d.name}</span>)}</div>; }
function Field({ t, label, children, full }){ return <label className={`block ${full?"sm:col-span-2":""}`}><span className={`text-xs ${t.faint} mb-1 block`}>{label}</span>{children}</label>; }
function Tag({ t, children, accent, accent2 }){ if(accent) return <span className="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full accent-soft accent-text">{children}</span>; if(accent2) return <span className="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full accent-soft-2" style={{color:"var(--accent2)"}}>{children}</span>; return <span className={`inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full ${t.chip}`}>{children}</span>; }
function Detail({ t, k, v }){ return <div className="col-span-2 sm:col-span-1"><div className={`text-[11px] ${t.faint}`}>{k}</div><div className="font-medium">{v}</div></div>; }
function Empty({ t, icon, title, body, cta, onCta }){ return <div className="flex flex-col items-center justify-center text-center py-20 px-6"><div className="w-14 h-14 rounded-2xl accent-soft flex items-center justify-center mb-4"><Icon name={icon} size={24} className="accent-text"/></div><h2 className="display text-lg font-semibold">{title}</h2><p className={`text-sm ${t.sub} mt-1 max-w-sm`}>{body}</p>{cta&&<button onClick={onCta} className="mt-5 px-5 py-2.5 rounded-xl accent-bg text-white text-sm font-semibold">{cta}</button>}</div>; }

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
